<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAYUMIN Tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; }
   .header { background: #f85606; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
   .logo { font-size: 24px; font-weight: bold; }
   .cart-icon { position: relative; cursor: pointer; font-size: 24px; }
   .cart-count { position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
   .products { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
   .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
   .product-img { width: 100%; height: 140px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 40px; }
   .product-info { padding: 12px; }
   .product-name { font-size: 14px; margin-bottom: 5px; }
   .product-price { color: #f85606; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
   .add-cart-btn { width: 100%; background: #f85606; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">SAYUMIN</div>
    <div class="cart-icon" onclick="showCart()"> 🛒 <span class="cart-count" id="cartCount">0</span> </div>
  </div>

  <div class="products" id="productList"></div>

  <script>
    // Console එකේ මේක Print වෙනවද බලන්න
    console.log("SAYUMIN Tech Script Start");
    
    var products = [
      { id: 1, name: "Laptop IC Chip", price: 1000 },
      { id: 2, name: "Laptop Keyboard", price: 2500 },
      { id: 3, name: "Repair Tool Kit", price: 3200 }
    ];

    var cart = [];
    
    // Products ටික හදන Function එක
    function loadProducts() {
      var html = "";
      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        html += '<div class="product-card">';
        html += '<div class="product-img">🔧</div>';
        html += '<div class="product-info">';
        html += '<div class="product-name">' + p.name + '</div>';
        html += '<div class="product-price">Rs ' + p.price + '</div>';
        html += '<button class="add-cart-btn" onclick="addToCart(' + p.id + ')">Add to Cart</button>';
        html += '</div></div>';
      }
      document.getElementById('productList').innerHTML = html;
      console.log("Products Loaded");
    }

    // Cart එකට Add කරන Function එක
    function addToCart(productId) {
      var product = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].id === productId) {
          product = products[i];
          break;
        }
      }
      if (product) {
        cart.push(product);
        document.getElementById('cartCount').textContent = cart.length;
        alert(product.name + ' Cart එකට දැම්මා! ✅');
      }
    }

    // Cart එක පෙන්නන Function එක
    function showCart() {
      if (cart.length === 0) {
        alert('Cart එක හිස් බං 🛒');
        return;
      }
      var message = 'Cart එකේ තියෙන බඩු:\n\n';
      var total = 0;
      for (var i = 0; i < cart.length; i++) {
        message += (i + 1) + '. ' + cart[i].name + ' - Rs ' + cart[i].price + '\n';
        total += cart[i].price;
      }
      message += '\nTotal: Rs ' + total;
      alert(message);
    }

    // Page එක Load වෙද්දිම Products ටික Load කරනවා
    loadProducts();
  </script>
</body>
</html>
