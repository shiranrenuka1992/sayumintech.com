<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAYUMIN Tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; }
    .header { background: #f85606; padding: 15px; color: white; text-align: center; font-size: 24px; font-weight: bold; }
    .products { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .product-img { width: 100%; height: 140px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .product-info { padding: 12px; }
    .product-name { font-size: 14px; margin-bottom: 5px; }
    .product-price { color: #f85606; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
    .add-cart-btn { width: 100%; background: #f85606; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">SAYUMIN</div>

  <div class="products">
    <!-- Card 1 -->
    <div class="product-card">
      <div class="product-img">🔧</div>
      <div class="product-info">
        <div class="product-name">Laptop IC Chip</div>
        <div class="product-price">Rs 1000</div>
        <button class="add-cart-btn">Add to Cart</button>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="product-card">
      <div class="product-img">⌨️</div>
      <div class="product-info">
        <div class="product-name">Laptop Keyboard</div>
        <div class="product-price">Rs 2500</div>
        <button class="add-cart-btn">Add to Cart</button>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="product-card">
      <div class="product-img">🛠️</div>
      <div class="product-info">
        <div class="product-name">Repair Tool Kit</div>
        <div class="product-price">Rs 3200</div>
        <button class="add-cart-btn">Add to Cart</button>
      </div>
    </div>
  </div>

</body>
</html>
